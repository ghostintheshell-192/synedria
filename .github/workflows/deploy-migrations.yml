name: Deploy migrations

# Runs only after CI has gone green on main, and only for that exact commit —
# a schema change is applied to production solely if the code that needs it
# builds. Triggered via workflow_run rather than as a job inside CI so this
# workflow can set cancel-in-progress: false: CI cancels superseded runs, which
# is right for a build and dangerous for a migration.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations to production
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Dedicated environment, deliberately not the `Production` one Vercel
    # created for its own deploys: protection rules attach to the environment,
    # so sharing it would make a reviewer gate on schema changes also gate
    # every Vercel deploy, and vice versa. Add a required reviewer here in repo
    # settings for a human gate before production schema changes.
    environment: supabase-production

    steps:
      - name: Checkout the commit CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI and local runs share these entry points (ADR-012): all
      # stack-specific knowledge lives in .development/automation/, not here.
      - name: Push migrations
        run: .development/automation/db-push.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      # Deliberately after the push, not before: on any branch that is ahead of
      # production, pending migrations are the normal state and a pre-check would
      # cry wolf. What must never happen is the deploy *finishing* with a gap
      # still open, so this asserts the push actually closed it. It also catches
      # drift the other way — schema applied remotely that this repo cannot
      # reproduce, which is how the 2026-07-20 outage started.
      - name: Verify schema matches migrations
        run: .development/automation/db-check.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
