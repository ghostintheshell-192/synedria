name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI and local git hooks share these entry points (ADR-012): all
      # stack-specific knowledge lives in .development/automation/, not here.
      - name: Lint
        run: .development/automation/format-check.sh

      - name: Type check
        run: .development/automation/typecheck.sh

      - name: Build
        run: .development/automation/build.sh

      - name: Test
        run: .development/automation/test.sh
