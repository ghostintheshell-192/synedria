name: Release

# Synedria is a web app deployed by Vercel automatically from GitHub, so there
# is no build artifact to ship. This workflow only cuts a GitHub Release with
# changelog notes (git-cliff) when a version tag is pushed, to mark versions.

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs full history + tags

      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.cliff.outputs.changelog }}"
